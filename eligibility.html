<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eligibility Check | Blood Donation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542884748-2b87b36c6b90?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            color: white;
            padding: 50px 10%;
            min-height: 100vh;
        }

        .checker-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        h2 { color: #ff4d4d; margin-bottom: 20px; }

        .question { margin-bottom: 25px; text-align: left; }
        .question label { display: block; margin-bottom: 10px; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            margin-bottom: 10px;
        }

        .btn-check {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-check:hover { background: #cc0000; transform: scale(1.02); }

        #resultBox {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background: rgba(46, 204, 113, 0.3); border: 1px solid #2ecc71; color: #2ecc71; }
        .error { background: rgba(231, 76, 60, 0.3); border: 1px solid #e74c3c; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="checker-card">
        <h2>Can You Donate Blood?</h2>
        <p style="margin-bottom: 30px;">Apni details bhariye aur turant check karein.</p>

        <div class="question">
            <label>Aapki Umr (Age) kya hai?</label>
            <input type="number" id="age" placeholder="Ex: 25">
        </div>

        <div class="question">
            <label>Aapka Wazan (Weight in kg) kitna hai?</label>
            <input type="number" id="weight" placeholder="Ex: 55">
        </div>

        <div class="question">
            <label>Aapne aakhri baar kab donate kiya tha?</label>
            <select id="lastDonation">
                <option value="none">Pehli Baar (Never)</option>
                <option value="recent">3 Mahine ke andar</option>
                <option value="old">3 Mahine se pehle</option>
            </select>
        </div>

        <button class="btn-check" onclick="checkEligibility()">Check My Eligibility</button>

        <div id="resultBox"></div>
    </div>

    <script>
        function checkEligibility() {
            let age = document.getElementById('age').value;
            let weight = document.getElementById('weight').value;
            let last = document.getElementById('lastDonation').value;
            let res = document.getElementById('resultBox');

            res.style.display = "block";

            if (age >= 18 && age <= 65 && weight >= 50 && last !== "recent") {
                res.className = "success";
                res.innerHTML = "🎉 Mubarak ho! Aap blood donate karne ke liye FIT hain. <br><br> <a href='donor_register.html' style='color: white;'>Abhi Register Karein</a>";
            } else {
                res.className = "error";
                let reason = "";
                if (age < 18) reason = "Aapki umr 18 saal se kam hai.";
                else if (weight < 50) reason = "Aapka wazan 50kg se kam hai.";
                else if (last === "recent") reason = "Aapne haal hi mein donate kiya hai, kripya 3 mahine rukie.";
                else reason = "Kripya sahi jankari bhariye.";
                
                res.innerHTML = "❌ Maaf kijiye! Aap abhi donate nahi kar sakte. <br> Reason: " + reason;
            }
        }
    </script>

</body>
</html>
