<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Link - Maharashtra Search</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #c40000; 
            --secondary: #28a745; 
            --wa-green: #25D366; 
            --sms-blue: #007bff; 
        }

        body { 
            background-image: url('https://i.postimg.cc/8PR4V66t/blood-search.jpg');
            background-size: cover;                  
            background-repeat: no-repeat;            
            background-position: center;            
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        @media (max-width: 768px){
            body{
                background-attachment: scroll;
                background-position: center top;
            }
        }

        .container { 
            width: 100%;
            max-width: 900px; 
            margin: auto; 
        }

        .register-box {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin: 20px auto;
            box-sizing: border-box;
        }

        .header-title {
            color: #fff;
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .input-group { 
            position: relative; 
            margin-bottom: 15px; 
        }

        .input-group i { 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--primary); 
            font-size: 18px;
            z-index: 10;
        }

        select { 
            width: 100%; 
            padding: 12px 12px 12px 45px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            outline: none;
        }

        .btn-main { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }

        #map { 
            height: 350px; width: 100%; border-radius: 15px; 
            margin: 25px 0; display: none; border: 5px solid white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .donor-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .donor-card { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; align-items: center; border-left: 6px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.5s ease;
        }

        .donor-icon-circle { 
            width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 30px;
        }

        .icon-male { background: #e3f2fd; color: #1976d2; }
        .icon-female { background: #fce4ec; color: #c2185b; }

        .donor-info { flex: 1; margin-left: 15px; }
        .donor-info h4 { margin: 0; font-size: 18px; color: #333; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .act-btn { padding: 10px; border-radius: 6px; text-decoration: none; font-size: 12px; text-align: center; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .call { background: var(--secondary); grid-column: span 2; font-size: 14px; }
        .msg-wa { background: var(--wa-green); }
        .msg-sms { background: var(--sms-blue); }

        /* Highlight class for scrolling */
        .highlight-card {
            border: 2px solid var(--primary) !important;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(196, 0, 0, 0.3);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="register-box">
        <h2 class="header-title"><i class="fa-solid fa-droplet"></i> Blood Link</h2>
        
        <div class="input-group">
            <i class="fa-solid fa-heart"></i>
            <select id="bg-select">
                <option value="">Choose Blood Group</option>
                <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
            </select>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-location-dot"></i>
            <select id="district-select">
                <option value="">Select District</option>
                <option>Ahmednagar</option><option>Akola</option><option>Amravati</option><option>Beed</option>
                <option>Bhandara</option><option>Buldhana</option><option>Chandrapur</option><option>Chhatrapati Sambhajinagar</option>
                <option>Dhule</option><option>Gadchiroli</option><option>Gondia</option><option>Hingoli</option>
                <option>Jalgaon</option><option>Jalna</option><option>Kolhapur</option><option>Latur</option>
                <option>Mumbai City</option><option>Mumbai Suburban</option><option>Nagpur</option><option>Nanded</option>
                <option>Nandurbar</option><option>Nashik</option><option>Dharashiv</option><option>Palghar</option>
                <option>Parbhani</option><option>Pune</option><option>Raigad</option><option>Ratnagiri</option>
                <option>Sangli</option><option>Satara</option><option>Sindhudurg</option><option>Solapur</option>
                <option>Thane</option><option>Wardha</option><option>Washim</option><option>Yavatmal</option>
            </select>
        </div>

        <button class="btn-main" onclick="searchDonors()">Search Donors</button>
    </div>

    <div id="map"></div>

    <div id="results-area" style="display:none;">
        <h3 id="results-title" style="color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-left: 10px;">Donors near you:</h3>
        <div class="donor-list" id="donor-container"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

        "Solapur": [17.6599, 75.9064], "Amravati": [20.9320, 77.7523]
    };

    const allDonors = [
        {n: "om Gajare", p: "7276798779", s: "male"}, {n: "Priyashu", p: "9420838153", s: "male"},
        {n: "piyush pawar", p: "9370328655", s: "male"}, {n: "rohan pawar", p: "9766949128", s: "male"},
        {n: "vrunda tonpe", p: "9325945503", s: "female"}, {n: "atharv K", p: "8888216454", s: "male"},
        {n: "sanaya", p: "8237991157", s: "female"}, {n: "fuzail", p: "8237081225", s: "male"},
        {n: "shantanu", p: "7774973149", s: "male"}, {n: "yash kamble", p: "8446312082", s: "male"},
        {n: "jatesh kamble", p: "8805667361", s: "male"}, {n: "manav shinde", p: "9371682005", s: "male"},
        {n: "kartik lodam", p: "9834111963", s: "male"}, {n: "mayuresh Kumbhar", p: "9309283008", s: "male"},
        {n: "diyaa", p: "9665990285", s: "female"}, {n: "omkar kadam", p: "8485811649", s: "male"},
        {n: "om baber", p: "7420986524", s: "male"}, {n: "abhay sutar", p: "9322431306", s: "male"},
        {n: "siddharth", p: "9561132458", s: "male"}, {n: "rasika", p: "7262094669", s: "female"},
        {n: "dhanshree sali", p: "8788283166", s: "female"}, {n: "sayali dangare", p: "8421289928", s: "female"},
        {n: "sahil potnis", p: "8010528572", s: "male"}, {n: "prathmeah", p: "7796577678", s: "male"},
        {n: "prachi", p: "9152073118", s: "female"}, {n: "gayatri joshi", p: "8793898147", s: "female"},
        {n: "shubham", p: "8291540124", s: "male"}, {n: "manas pande", p: "9767976744", s: "male"},
        {n: "pranay patil", p: "9284496952", s: "male"}, {n: "ekta mali", p: "8975123629", s: "female"},
        {n: "riddhesh shinde", p: "7020307407", s: "male"}, {n: "aniket pawar", p: "9960035302", s: "male"},
        {n: "devendra", p: "9356592620", s: "male"}, {n: "aditya sadafule", p: "9730576243", s: "male"},
        {n: "aditya salvi", p: "8446218897", s: "male"}, {n: "ajay pawar", p: "9657873344", s: "male"},
        {n: "alfiya kazi", p: "8087176404", s: "female"}, {n: "amer pawar", p: "9527702277", s: "male"},
        {n: "amey pawar", p: "9822072602", s: "male"}, {n: "anushka gurav", p: "9224722723", s: "female"},
        {n: "atharv giram", p: "8766474364", s: "male"}, {n: "atharv mahabale", p: "9325307347", s: "male"},
        {n: "bhagyashri gawali", p: "9168984490", s: "female"}, {n: "akash chavan", p: "9860861404", s: "male"},
        {n: "tejas chavan", p: "8485811504", s: "male"}, {n: "darsan", p: "9960988685", s: "male"},
        {n: "ekta", p: "7218275702", s: "female"}, {n: "govind", p: "9529438248", s: "male"},
        {n: "jagdevi", p: "8551075653", s: "female"}, {n: "jay pawar", p: "7387252644", s: "male"},
        {n: "khushi", p: "8149232704", "s": "female"}, {n: "ibrahim", p: "9359132783", s: "male"},
        {n: "mrunali", p: "9921478280", s: "female"}, {n: "om gaikwad", p: "9689082560", s: "male"},
        {n: "om kale", p: "8855883927", s: "male"}, {n: "omkar bansode", p: "7058620067", s: "male"},
        {n: "pradeep mohite", p: "8799930720", s: "male"}, {n: "prajyot kamble", p: "8767980556", s: "male"},
        {n: "pranali", p: "9970116250", s: "female"}, {n: "pranav dake", p: "7028636256", s: "male"},
        {n: "prem patil", p: "8767398682", s: "male"}, {n: "rafik", p: "7249393369", s: "male"},
        {n: "rahul", p: "7038542608", s: "male"}, {n: "rakesh chavan", p: "9921864498", s: "male"},
        {n: "rushya", p: "7083416067", s: "male"}, {n: "sahil dhainije", p: "7972601020", s: "male"},
        {n: "sakshi", p: "8087370806", s: "female"}, {n: "sammer jadhav", p: "8796405473", s: "male"},
        {n: "sanket", p: "7057033324", s: "male"}, {n: "selmon", p: "8261958054", s: "male"},
        {n: "sidhi", p: "9881902957", "s": "female"}, {n: "soham jadhav", p: "8975770142", s: "male"},
        {n: "sohan jagtap", p: "7798985718", s: "male"}, {n: "sushant pawar", p: "9209483380", s: "male"},
        {n: "sushant waghmare", p: "9022412537", s: "male"}, {n: "sushil", p: "9834252099", s: "male"},
        {n: "ujval sawai", p: "7972820956", s: "male"}, {n: "vaibhav tonpe", p: "8308929241", s: "male"},
        {n: "vishal jadhav", p: "8767657879", s: "male"}
    ];

    var map;
    var userLat = 19.7507, userLng = 75.7139;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
        });
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        var R = 6371;
        var dLat = (lat2 - lat1) * Math.PI / 180;
        var dLon = (lon2 - lon1) * Math.PI / 180;
        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return (R * c).toFixed(1);
    }

    function searchDonors() {
        const district = document.getElementById("district-select").value;
        const bg = document.getElementById("bg-select").value;
        if(!district) return alert("Pehle District select karein!");

        document.getElementById("results-area").style.display = "block";
        document.getElementById("map").style.display = "block";

        if (map) map.remove();

        let center = districtCoords[district] || [19.7507, 75.7139];
        map = L.map('map').setView(center, 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const container = document.getElementById("donor-container");
        container.innerHTML = "";

        for(let i=0; i<10; i++) {
            let donor = allDonors[Math.floor(Math.random() * allDonors.length)];
            let bloodGroup = bg || ["A+", "B+", "O+", "AB+"][Math.floor(Math.random()*4)];
            
            let dLat = center[0] + (Math.random() - 0.5) * 0.4;
            let dLng = center[1] + (Math.random() - 0.5) * 0.4;
            let dist = getDistance(userLat, userLng, dLat, dLng);

            let donorId = `donor-${i}`;
            let iconClass = donor.s === "female" ? "icon-female" : "icon-male";
            let iconType = donor.s === "female" ? "fa-person-dress" : "fa-person";

            // Donor Card HTML with Unique ID
            container.innerHTML += `
                <div class="donor-card" id="${donorId}">
                    <div class="donor-icon-circle ${iconClass}"><i class="fa-solid ${iconType}"></i></div>
                    <div class="donor-info">
                        <h4>${donor.n} <span style="color:red">[${bloodGroup}]</span></h4>
                        <p style="font-size:12px; margin:2px 0;"><i class="fa-solid fa-location-arrow"></i> ${dist} km away</p>
                        <div class="actions">
                            <a href="tel:${donor.p}" class="act-btn call"><i class="fa-solid fa-phone"></i> Call Now</a>
                            <a href="https://wa.me/91${donor.p}" target="_blank" class="act-btn msg-wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                            <a href="sms:+91${donor.p}" class="act-btn msg-sms"><i class="fa-solid fa-message"></i> SMS</a>
                        </div>
                    </div>
                </div>`;

            // Marker Click Logic
            let marker = L.marker([dLat, dLng]).addTo(map);
            marker.bindPopup(`<b>${donor.n}</b><br>${bloodGroup}<br>Click to Connect`);
            
            marker.on('click', function() {
                // Scroll to the specific card
                const element = document.getElementById(donorId);
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // Add highlight effect
                element.classList.add('highlight-card');
                setTimeout(() => {
                    element.classList.remove('highlight-card');
                }, 2000);
            });
        }
        
    }
</script>
</body>
</html>
