<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            padding: 20px;
        }

        .auth-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 25px #00d4ff;
            overflow: hidden;
        }

        /* --- Panels --- */
        .auth-wrapper .credentials-panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            flex-direction: column;
            z-index: 2;
        }

        .credentials-panel.signin {
            left: 0;
            padding: 0 40px;
        }

        .credentials-panel.signup {
            right: 0;
            padding: 0 40px;
        }

        /* --- Form Elements --- */
        .credentials-panel h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .field-wrapper {
            position: relative;
            width: 100%;
            height: 50px;
            margin-top: 25px;
        }

        .field-wrapper input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            border-bottom: 2px solid #fff;
            padding-right: 25px;
            transition: .5s;
        }

        .field-wrapper input:focus,
        .field-wrapper input:valid {
            border-bottom: 2px solid #00d4ff;
        }

        .field-wrapper label {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            transition: .5s;
        }

        .field-wrapper input:focus~label,
        .field-wrapper input:valid~label {
            top: -5px;
            color: #00d4ff;
            font-size: 13px;
        }

        .field-wrapper i {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
        }

        .submit-button {
            width: 100%;
            height: 45px;
            background: transparent;
            border: 2px solid #00d4ff;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 30px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .submit-button::before {
            content: "";
            position: absolute;
            top: -100%; left: 0;
            width: 100%; height: 300%;
            background: linear-gradient(#1a1a2e, #00d4ff, #1a1a2e, #00d4ff);
            z-index: -1;
            transition: 0.5s;
        }

        .submit-button:hover::before { top: 0; }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .switch-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- Shapes & Animations (Logic from your original code) --- */
        .background-shape {
            position: absolute;
            right: 0; top: -5px;
            height: 600px; width: 850px;
            background: linear-gradient(45deg, #1a1a2e, #00d4ff);
            transform: rotate(10deg) skewY(40deg);
            transform-origin: bottom right;
            transition: 1.5s ease 1.6s;
        }

        .auth-wrapper.toggled .background-shape {
            transform: rotate(0deg) skewY(0deg);
            transition-delay: .5s;
        }

        /* --- Toggle Animations for Elements --- */
        .slide-element { transition: .7s; }
        
        .auth-wrapper.toggled .credentials-panel.signin .slide-element {
            transform: translateX(-120%);
            opacity: 0;
        }

        .credentials-panel.signup .slide-element {
            transform: translateX(120%);
            opacity: 0;
        }

        .auth-wrapper.toggled .credentials-panel.signup .slide-element {
            transform: translateX(0);
            opacity: 1;
        }

        .welcome-section {
            position: absolute;
            width: 50%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; padding: 40px;
        }
        .welcome-section.signin { right: 0; text-align: right; }
        .welcome-section.signup { left: 0; opacity: 0; pointer-events: none; }
        
        .auth-wrapper.toggled .welcome-section.signin { opacity: 0; }
        .auth-wrapper.toggled .welcome-section.signup { opacity: 1; }

        /* Footer */
        .footer { margin-top: 30px; font-size: 14px; }
        .footer a { color: #00d4ff; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="background-shape"></div>
        
        <div class="credentials-panel signin">
            <h2 class="slide-element">Login</h2>
            <form action="login.php" method="POST">
                <div class="field-wrapper slide-element">
                    <input type="text" name="username" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" name="password" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button class="submit-button slide-element" type="submit">Login</button>

                <div class="switch-link slide-element">
                    <p>Don't have an account? <br> <a href="#" class="register-trigger">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

        <div class="credentials-panel signup">
            <h2 class="slide-element">Register</h2>
            <form action="register.php" method="POST">
                <div class="field-wrapper slide-element">
                    <input type="text" name="username" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="email" name="email" required>
                    <label>Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" name="password" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button class="submit-button slide-element" type="submit">Register</button>

                <div class="switch-link slide-element">
                    <p>Already have an account? <br> <a href="#" class="login-trigger">Sign In</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signup">
            <h2 class="slide-element">WELCOME!</h2>
            
        </div>
    </div>

    <div class="footer">
        <p>Made with ❤️ by <a href="#">Personal Finance</a></p>
    </div>

    <script>
        const authWrapper = document.querySelector('.auth-wrapper');
        const loginTrigger = document.querySelector('.login-trigger');
        const registerTrigger = document.querySelector('.register-trigger');

        registerTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            authWrapper.classList.add('toggled');
        });

        loginTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            authWrapper.classList.remove('toggled');
        });
    </script>
</body>
</html>
